<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Rock Paper Scissors.css">
  </head>
  <body>

    <p class="title">Rock Paper Scissors</p>
    <button class="move-button js-rock-button">
      <img src="img/rock-emoji.png" class="move-icon">
    </button>
    <button class="move-button js-paper-button">
      <img src="img/paper-emoji.png" class="move-icon">
    </button>
    <button class="move-button js-scissors-button">
      <img src="img/scissors-emoji.png" class="move-icon">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button class="reset-score-button">Reset Score</button>
    <button class="auto-play-button">Auto Play</button>
    <p class="warning"></p>

    <script src="Rock Paper Scissors.js"></script>
  </body>
</html>
