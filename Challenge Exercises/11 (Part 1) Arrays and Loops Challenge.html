    <body>
    
    <script>
      function minMax(nums) {
        let minMax = { min: nums[0], max: nums[0], };

        if (nums.length < 1) {
          minMax.min = null;
          minMax.max = null;
        }

        for (let i = 0; i <= nums.length; i++) {
          nums[i] < minMax.min ? minMax.min = nums[i] : null;
          nums[i] > minMax.max ? minMax.max = nums[i] : null;
        }
        return minMax;
      }
      console.log(minMax([1, -3, 5]));
      console.log(minMax([-2, 3, -5, 7, 10]));
      console.log(minMax([]));
      console.log(minMax([3]));

      function countWords(words) {
        const wordsCount = {};
        for (let i = 0; i < words.length; i++) {
          !wordsCount[words[i]] ? wordsCount[words[i]] = 1 : wordsCount[words[i]]++;
        }
        return wordsCount;
      }
      console.log(countWords(['apple', 'grape', 'apple', 'apple']));
    </script>
  </body>
</html>
