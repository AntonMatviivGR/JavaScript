<!DOCTYPE html>
<html>
  <head>
    <title>6 Booleans and If-Statements Challenge</title>
  </head>
  <body>
    <p>
      <button onclick="cartQuantity < 10 ? console.log(`Cart Quantity: ${cartQuantity += 1}`) : console.log(`The cart is full`);">Add to Cart</button>
      <button onclick="cartQuantity < 9 ? console.log(`Cart Quantity: ${cartQuantity += 2}`) : console.log(`The cart is full`);">+2</button>
      <button onclick="cartQuantity < 8 ? console.log(`Cart Quantity: ${cartQuantity += 3}`) : console.log(`The cart is full`);">+3</button>
      <button onclick="cartQuantity < 7 ? console.log(`Cart Quantity: ${cartQuantity += 4}`) : console.log(`The cart is full`);">+4</button>
      <button onclick="cartQuantity < 6 ? console.log(`Cart Quantity: ${cartQuantity += 5}`) : console.log(`The cart is full`);">+5</button>
    </p>
    <p>
      <button onclick="cartQuantity > 0 ? console.log(`Cart Quantity: ${cartQuantity -= 1}`) : alert(`Not enough items in the cart`);">Remove from Cart</button>
      <button onclick="cartQuantity > 1 ? console.log(`Cart Quantity: ${cartQuantity -= 2}`) : alert(`Not enough items in the cart`);">-2</button>
      <button onclick="cartQuantity > 2 ? console.log(`Cart Quantity: ${cartQuantity -= 3}`) : alert(`Not enough items in the cart`);">-3</button>
      <button onclick="cartQuantity > 3 ? console.log(`Cart Quantity: ${cartQuantity -= 4}`) : alert(`Not enough items in the cart`);">-4</button>
      <button onclick="cartQuantity > 4 ? console.log(`Cart Quantity: ${cartQuantity -= 5}`) : alert(`Not enough items in the cart`);">-5</button>
    </p>

    <script>

      let cartQuantity = 0;

    </script>
  </body>
</html>
