<!DOCTYPE html>
<html>
  <head>
    <title>10 HTML, CSS, and JavaScript Together</title>
    <style>
      button {
        cursor: pointer;
      }
      
      .add-to-cart {
        background-color: rgb(250, 225, 25);
        border: none;
        font-size: 20px;
        border-radius: 32px;
        padding: 8px 64px;
      }

      .request {
        color: rgb(250, 250, 250);
        background-color: rgb(25, 25, 25);
        font-weight: 600;
        border: none;
        border-radius: 4px;
        padding: 10px 16px;
        margin: 0 8px 0 0;
      }

      .schedule {
        background-color: rgb(225, 225, 225);
        font-weight: 600;
        border: none;
        border-radius: 4px;
        padding: 10px 16px;
      }

      .toggle-button {
        background-color: rgb(225, 225, 225);
        border: none;
        border-radius: 4px;
        padding: 8px;
      }

      .is-toggled {
        color: rgb(250, 250, 250);
        background-color: rgb(25, 25, 25);
        border: none;
        border-radius: 4px;
        padding: 8px;
      }

    </style>
  </head>
  <body>
    <p>
      <button class="add-to-cart">Add to Cart</button>
    </p>
    <p>
      <button class="request">Request now</button>
      <button class="schedule">Schedule for later</button>
    </p>
    <p>
      <button class="js-button">Test</button>
    </p>
    <p>
      <button class="toggle-button button1" onclick="buttonSwitch(`button1`);">Gaming</button>
      <button class="toggle-button button2" onclick="buttonSwitch(`button2`);">Music</button>
      <button class="toggle-button button3" onclick="buttonSwitch(`button3`);">Tech</button>
    </p>
    
    <script>
      const button = document.querySelector('.js-button')
      console.log(button.classList.contains('js-button'));

      function buttonSwitch(button) {
        let toogleButton = document.querySelector(`.${button}`);
        if (!toogleButton.classList.contains('is-toggled'))
          toogleButton.classList.add('is-toggled');
        else toogleButton.classList.remove('is-toggled');
      }
    </script>
  </body>
</html>
