<!DOCTYPE html>
<html>
  <head>
    <title>12 Advanced Functions</title>
    <style>

    </style>
  </head>
  <body>

    <script>
      const multiply = (num1, num2) => num1 * num2;
      console.log(multiply(2, 3));
      console.log(multiply(7, 10));

      function countPositives(nums) {
        let positiveCount = 0;
        nums.forEach((num) => num > 0 ? positiveCount++ : null);
        return positiveCount;
      }
      console.log(countPositives([1, -3, 5]));
      console.log(countPositives([-2, 3, -5, 7, 10]));

      function addNum(array, num) {
        return array.map((value) => value + num);
      }
      console.log(addNum([1, 2, 3], 2));
      console.log(addNum([-2, -1, 0, 99], 2));

      function removeEgg(foods) {
        let eggsRemoved = 0;
        return foods.filter((value) => {
          if (value == 'egg' && eggsRemoved < 2) {
            eggsRemoved++;
            return false;
          }
          else {
            return true;
          }
        });
      }
      console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
    </script>
  </body>
</html>
