<!DOCTYPE html>
<html>
  <head>
    <title>11 Arrays and Loops</title>
    <style>

    </style>
  </head>
  <body>

    <script>
      const nums = [10, 20, 30];
      console.log(nums);
      nums[2] = 99;
      console.log(nums);

      function getLastValue(array) {
        console.log(array[array.length - 1]);
      }
      getLastValue([1, 20, 22, 24, 5]);
      getLastValue(['hi', 'hello', 'good']);

      function arraySwap(array) {
        const firstValue = array[0];
        array[0] = (array[array.length - 1]);
        array[array.length - 1] =  firstValue;
        console.log(array);
      }
      arraySwap([1, 20, 22, 24, 5]);
      arraySwap(['hi', 'hello', 'good']);

      console.log(`--------`);
      for (let i = 0; i <= 10; i += 2) console.log(i);
      console.log(`--------`);
      for (let i = 5; i >= 0; i--) console.log(i);
      console.log(`--------`);

      let i1 = 0;
      while (i1 <= 10) {
        console.log(i1);
        i1 += 2;
      }
      console.log(`--------`);
      let i2 = 5;
      while (i2 >= 0) {
        console.log(i2);
        i2--; 
      }
      console.log(`--------`);

      const arr1 = [1, 2, 3];
      const arr2 = [];
      for (let i = 0; i < arr1.length; i++) arr2.push(arr1[i] + 1);
      console.log(arr2);

      function addOne(array) {
        let newArray = [];
        for (let i = 0; i < array.length; i++) newArray.push(array[i] + 1);
        console.log(newArray);
      }
      addOne([-2, -1, 0, 99]);

      function addNum(array, num) {
        let newArray = [];
        for (let i = 0; i < array.length; i++) newArray.push(array[i] + num);
        console.log(newArray);
      }
      addNum([1, 2, 3], 2);
      addNum([1, 2, 3], 3);
      addNum([-2, -1, 0, 99], 2);

      function addArrays(array1, array2) {
        let newArray = [];
        for (let i = 0; i < array1.length; i++) newArray.push(array1[i] + array2[i]);
        console.log(newArray);
      }
      addArrays([1, 1, 2], [1, 1, 3]);
      addArrays([1, 2, 3], [4, 5, 6]);

      function countPositive(nums) {
        let positive = 0;
        for (let i = 0; i < nums.length; i++) nums[i] > 0 ? positive++ : null;
        console.log(positive);
      }
      countPositive([1, -3, 5]);
      countPositive([-2, 3, -5, 7, 10]);
    </script>
  </body>
</html>
