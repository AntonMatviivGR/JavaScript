<!DOCTYPE html>
<html>
  <head>
    <title>11 Arrays and Loops</title>
    <style>

    </style>
  </head>
  <body>

    <script>
      let array1 = ['hello', 'world', 'search', 'good'];
      index = -1;
      for (let i = 0; i <= array1.length; i++) {
        if (array1[i] == 'search') {
          index = i;
          break;
        }
      }
      console.log(index);

      function findIndex(array, word) {
        index = -1;
        for (let i = 0; i <= array.length; i++) {
          if (array[i] == word) {
            index = i;
            break;
          }
        }
        return index;
      }
      console.log(findIndex(['green', 'red', 'blue', 'red'], 'red'));
      console.log(findIndex(['green', 'red', 'blue', 'red'], 'yellow'));

      function removeEgg(foods) {
        let result = [];
        let eggsRemoved = 0;
        const foodsE = foods.slice();
        foodsE.reverse();
        for (let i = 0; i < foodsE.length; i++) {
          if (foodsE[i] !== 'egg' || eggsRemoved == 2) {
            result.push(foodsE[i]);
          }
          else {
            eggsRemoved++;
            continue;
          }
        }
        return result.reverse();
      }
      const foods = ['egg', 'apple', 'egg', 'egg', 'ham'];
      console.log(removeEgg(foods));
      console.log(foods);
    </script>
  </body>
</html>
